<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatheTrainer 7 – Terme</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>📚 MatheTrainer 7</h1>

        <div id="punkteAnzeige">
            ⭐ Punkte: <span id="punkte">0</span>
        </div>
    </header>

    <!-- Hauptmenü -->

    <section id="menu">

        <button onclick="starteBerechnen()">
            Werte von Termen
        </button>

        <button onclick="starteAufstellen()">
            Terme aufstellen
        </button>

        <button onclick="starteVergleichen()">
    🔧 Terme vereinfachen
        </button>

        <button onclick="starteGleichungen()">
            Gleichungen lösen
        </button>

        <button onclick="starteDenkaufgaben()">
            🧠 Denkaufgaben
        </button>

    </section>

    <!-- Trainer -->

    <section id="trainer" style="display:none;">

        <h2 id="titel"></h2>

        <div id="aufgabe"></div>

        <div id="antwortBereich">

            <input
                id="antwort"
                type="text"
                autocomplete="off"
                placeholder="Antwort eingeben">

        </div>

        <div id="multipleChoiceBereich"
             style="display:none;">

            <button class="antwortButton"
                    id="antwortA">
            </button>

            <button class="antwortButton"
                    id="antwortB">
            </button>

            <button class="antwortButton"
                    id="antwortC">
            </button>

            <button class="antwortButton"
                    id="antwortD">
            </button>

        </div>

        <button id="pruefButton"
                onclick="pruefen()">
            Prüfen
        </button>

        <div id="feedback"></div>

        <button onclick="naechsteAufgabe()">
            Nächste Aufgabe
        </button>

        <button onclick="zurueckZumMenue()">
            ⬅ Hauptmenü
        </button>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
